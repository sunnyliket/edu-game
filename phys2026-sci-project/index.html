<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026학년도 과학 교과</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, #dbeafe 0, transparent 32%),
        radial-gradient(circle at 90% 20%, #dcfce7 0, transparent 30%),
        radial-gradient(circle at 80% 90%, #fef3c7 0, transparent 34%),
        linear-gradient(135deg, #f8fafc, #eef2ff);
      color: #0f172a;
    }

    .wrap {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 48px 22px 70px;
    }

    header {
      text-align: center;
      margin-bottom: 34px;
    }

    .school-year {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      color: #4338ca;
      font-weight: 900;
      font-size: 0.95rem;
    }

    .school-year::before {
      content: "🔬";
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 5vw, 3.4rem);
      letter-spacing: -0.05em;
      font-weight: 950;
    }

    .desc {
      margin: 14px 0 0;
      color: #64748b;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .semester-toggle {
      width: fit-content;
      margin: 30px auto 42px;
      padding: 7px;
      display: flex;
      gap: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 16px 35px rgba(15, 23, 42, 0.1);
    }

    .semester-btn {
      border: 0;
      cursor: pointer;
      padding: 13px 30px;
      border-radius: 999px;
      background: transparent;
      color: #64748b;
      font-size: 1rem;
      font-weight: 900;
      transition:
        background 0.18s ease,
        color 0.18s ease,
        transform 0.18s ease,
        box-shadow 0.18s ease;
    }

    .semester-btn:hover {
      transform: translateY(-1px);
    }

    .semester-btn.active {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.32);
    }

    .semester-heading {
      text-align: center;
      margin-bottom: 28px;
    }

    .semester-heading h2 {
      margin: 0;
      font-size: 1.55rem;
      letter-spacing: -0.03em;
    }

    .semester-heading p {
      margin: 8px 0 0;
      color: #64748b;
      font-weight: 650;
    }

    .class-section {
      margin-top: 34px;
    }

    .class-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-size: 1.45rem;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .class-title::before {
      content: "";
      width: 10px;
      height: 34px;
      border-radius: 999px;
      background: linear-gradient(180deg, #6366f1, #22c55e);
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.28);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 150px;
      padding: 24px 20px;
      text-decoration: none;
      color: #0f172a;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        0 18px 35px rgba(15, 23, 42, 0.11),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
      overflow: hidden;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(99, 102, 241, 0.12), transparent 48%),
        linear-gradient(315deg, rgba(34, 197, 94, 0.12), transparent 45%);
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .card::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      opacity: 0.18;
    }

    .card:hover {
      transform: translateY(-7px) scale(1.02);
      background: white;
      box-shadow:
        0 26px 52px rgba(15, 23, 42, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 1);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card.disabled {
      cursor: not-allowed;
      color: #94a3b8;
      background: rgba(241, 245, 249, 0.74);
      border-color: rgba(203, 213, 225, 0.9);
      box-shadow:
        0 12px 24px rgba(15, 23, 42, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .card.disabled:hover {
      transform: none;
      background: rgba(241, 245, 249, 0.74);
      box-shadow:
        0 12px 24px rgba(15, 23, 42, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .card.disabled::before {
      opacity: 0;
    }

    .card.disabled::after {
      background: #cbd5e1;
      opacity: 0.22;
    }

    .card.disabled .class-name,
    .card.disabled .arrow {
      color: #94a3b8;
    }

    .class-name,
    .group-name,
    .arrow {
      position: relative;
      z-index: 1;
    }

    .class-name {
      margin-bottom: 9px;
      color: #6366f1;
      font-size: 0.95rem;
      font-weight: 900;
    }

    .group-name {
      font-size: 2.2rem;
      font-weight: 950;
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .arrow {
      margin-top: 16px;
      color: #64748b;
      font-size: 0.92rem;
      font-weight: 850;
    }

    @media (max-width: 560px) {
      .wrap {
        padding-top: 34px;
      }

      .semester-toggle {
        width: 100%;
      }

      .semester-btn {
        flex: 1;
        padding: 13px 0;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .card {
        min-height: 132px;
        padding: 20px 16px;
        border-radius: 24px;
      }

      .group-name {
        font-size: 1.75rem;
      }

      .arrow {
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header>
      <div class="school-year">2026학년도 과학 교과</div>
      <h1>6학년 과학 게임</h1>
      <p class="desc">학기, 반, 모둠을 선택해서 게임을 시작하세요.</p>
    </header>

    <div class="semester-toggle" aria-label="학기 선택">
      <button class="semester-btn active" type="button" data-semester="1">1학기</button>
      <button class="semester-btn" type="button" data-semester="2">2학기</button>
    </div>

    <section class="semester-heading">
      <h2 id="semesterTitle">1학기 과학 게임</h2>
      <p id="semesterDesc">6학년 1반, 2반, 3반의 모둠을 선택하세요.</p>
    </section>

    <section id="classList"></section>
  </main>

  <script>
    const classList = document.getElementById("classList");
    const semesterTitle = document.getElementById("semesterTitle");
    const semesterDesc = document.getElementById("semesterDesc");
    const semesterButtons = document.querySelectorAll(".semester-btn");

    const classes = [1, 2, 3];
    const groups = [1, 2, 3, 4, 5];
    const availableIndexes = new Set([
      "1-1-1",
      "1-1-2",
      "1-1-3",
      "1-2-1",
      "1-2-2",
      "1-2-3",
      "1-2-4",
    ]);

    let currentSemester = 1;

    function getKey(semester, classNumber, groupNumber) {
      return `${semester}-${classNumber}-${groupNumber}`;
    }

    function getLink(semester, classNumber, groupNumber) {
      return `./${semester}학기/6-${classNumber}/${groupNumber}/index.html`;
    }

    function renderCards() {
      semesterTitle.textContent = `${currentSemester}학기 과학 게임`;
      semesterDesc.textContent = `6학년 1반, 2반, 3반의 모둠을 선택하세요.`;

      classList.innerHTML = "";

      classes.forEach((classNumber) => {
        const section = document.createElement("section");
        section.className = "class-section";

        const title = document.createElement("div");
        title.className = "class-title";
        title.textContent = `6학년 ${classNumber}반`;

        const grid = document.createElement("div");
        grid.className = "grid";

        groups.forEach((groupNumber) => {
          const hasIndex = availableIndexes.has(getKey(currentSemester, classNumber, groupNumber));
          const card = document.createElement(hasIndex ? "a" : "div");
          card.className = hasIndex ? "card" : "card disabled";

          if (hasIndex) {
            card.href = getLink(currentSemester, classNumber, groupNumber);
            card.setAttribute(
              "aria-label",
              `${currentSemester}학기 6학년 ${classNumber}반 ${groupNumber}모둠 시작하기`
            );
          } else {
            card.setAttribute("aria-disabled", "true");
            card.setAttribute(
              "aria-label",
              `${currentSemester}학기 6학년 ${classNumber}반 ${groupNumber}모둠은 아직 준비되지 않았습니다`
            );
          }

          card.innerHTML = `
            <span class="class-name">6학년 ${classNumber}반</span>
            <span class="group-name">${groupNumber}모둠</span>
            <span class="arrow">${hasIndex ? "시작하기 →" : "준비 중"}</span>
          `;

          grid.appendChild(card);
        });

        section.appendChild(title);
        section.appendChild(grid);
        classList.appendChild(section);
      });
    }

    semesterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentSemester = Number(button.dataset.semester);

        semesterButtons.forEach((btn) => {
          btn.classList.remove("active");
        });

        button.classList.add("active");
        renderCards();
      });
    });

    renderCards();
  </script>
</body>
</html>
