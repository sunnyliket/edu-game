<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 테스트</title>
</head>
<body>
    <h1>게임 상태 확인</h1>
    <pre id="output"></pre>
    
    <script>
        // 게임 페이지를 iframe에서 로드
        document.write('<iframe src="index.html" style="width:100%; height:600px; border:1px solid #ccc;"></iframe>');
        
        // 콘솔에 에러 메시지 표시
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const output = document.getElementById('output');
            output.innerHTML += `에러: ${msg}\n위치: ${url}:${lineNo}:${columnNo}\n\n`;
            return false;
        };
    </script>
</body>
</html>
