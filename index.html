<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026학년도 과학 교과</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, #dbeafe 0, transparent 32%),
        radial-gradient(circle at 90% 20%, #dcfce7 0, transparent 30%),
        radial-gradient(circle at 80% 90%, #fef3c7 0, transparent 34%),
        linear-gradient(135deg, #f8fafc, #eef2ff);
      color: #0f172a;
    }

    .wrap {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 48px 22px 70px;
    }

    header {
      text-align: center;
      margin-bottom: 34px;
    }

    .school-year {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      color: #4338ca;
      font-weight: 900;
      font-size: 0.95rem;
    }

    .school-year::before { content: "🔬"; }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 5vw, 3.4rem);
      letter-spacing: -0.05em;
      font-weight: 950;
    }

    .desc {
      margin: 14px 0 0;
      color: #64748b;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .semester-toggle {
      width: fit-content;
      margin: 30px auto 42px;
      padding: 7px;
      display: flex;
      gap: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 16px 35px rgba(15, 23, 42, 0.1);
    }

    .semester-btn {
      border: 0;
      cursor: pointer;
      padding: 13px 30px;
      border-radius: 999px;
      background: transparent;
      color: #64748b;
      font-size: 1rem;
      font-weight: 900;
    }

    .semester-btn.active {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.32);
    }

    .semester-heading {
      text-align: center;
      margin-bottom: 28px;
    }

    .semester-heading h2 {
      margin: 0;
      font-size: 1.55rem;
      letter-spacing: -0.03em;
    }

    .semester-heading p {
      margin: 8px 0 0;
      color: #64748b;
      font-weight: 650;
    }

    .class-section { margin-top: 34px; }

    .class-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-size: 1.45rem;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .class-title::before {
      content: "";
      width: 10px;
      height: 34px;
      border-radius: 999px;
      background: linear-gradient(180deg, #6366f1, #22c55e);
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.28);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 150px;
      padding: 24px 20px;
      text-decoration: none;
      color: #0f172a;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        0 18px 35px rgba(15, 23, 42, 0.11),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-7px) scale(1.02);
      background: white;
      box-shadow:
        0 26px 52px rgba(15, 23, 42, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 1);
    }

    .card::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      opacity: 0.18;
    }

    .card.recommended {
      border-color: rgba(99, 102, 241, 0.34);
      box-shadow:
        0 20px 38px rgba(79, 70, 229, 0.13),
        0 18px 35px rgba(15, 23, 42, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.94);
    }

    .recommend-medal {
      position: absolute;
      top: 10px;
      right: 12px;
      z-index: 2;
      width: 64px;
      height: 80px;
      pointer-events: none;
      transform: rotate(3deg);
      transform-origin: 50% 16px;
    }

    .medal-circle {
      position: absolute;
      top: 0;
      left: 50%;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(99, 102, 241, 0.36);
      color: #4f46e5;
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.16);
      font-size: 0.72rem;
      font-weight: 950;
      line-height: 1.15;
      letter-spacing: 0;
      text-align: center;
      white-space: normal;
    }

    .medal-circle::before {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: inherit;
      border: 1px solid rgba(79, 70, 229, 0.12);
    }

    .medal-ribbon {
      position: absolute;
      top: 48px;
      width: 22px;
      height: 30px;
      background: linear-gradient(180deg, #6366f1, #38bdf8);
      border: 1px solid rgba(79, 70, 229, 0.18);
      box-shadow: 0 8px 14px rgba(79, 70, 229, 0.12);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 76%, 0 100%);
    }

    .medal-ribbon.left {
      left: 15px;
      transform: rotate(10deg);
      background: linear-gradient(180deg, #6366f1, #60a5fa);
    }

    .medal-ribbon.right {
      right: 15px;
      transform: rotate(-10deg);
      background: linear-gradient(180deg, #4f46e5, #22d3ee);
    }

    .recommend-medal.representative .medal-circle {
      background: linear-gradient(135deg, #fff8e6, #fff3c4);
      border-color: rgba(232, 199, 102, 0.82);
      color: #8a6a00;
      box-shadow: 0 10px 22px rgba(217, 164, 65, 0.16);
    }

    .recommend-medal.representative .medal-circle::before {
      border-color: rgba(232, 199, 102, 0.36);
    }

    .recommend-medal.representative .medal-ribbon {
      border-color: rgba(217, 164, 65, 0.26);
      box-shadow: 0 8px 14px rgba(217, 164, 65, 0.12);
    }

    .recommend-medal.representative .medal-ribbon.left {
      background: linear-gradient(180deg, #e7c45a, #d9a441);
    }

    .recommend-medal.representative .medal-ribbon.right {
      background: linear-gradient(180deg, #f0d978, #d9a441);
    }

    .card.disabled {
      cursor: not-allowed;
      color: #94a3b8;
      background: rgba(241, 245, 249, 0.74);
      border-color: rgba(203, 213, 225, 0.9);
      box-shadow:
        0 12px 24px rgba(15, 23, 42, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .card.disabled:hover {
      transform: none;
      background: rgba(241, 245, 249, 0.74);
      box-shadow:
        0 12px 24px rgba(15, 23, 42, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .class-name,
    .group-name,
    .arrow {
      position: relative;
      z-index: 1;
    }

    .class-name {
      margin-bottom: 9px;
      color: #6366f1;
      font-size: 0.95rem;
      font-weight: 900;
    }

    .card.disabled .class-name,
    .card.disabled .arrow {
      color: #94a3b8;
    }

    .group-name {
      font-size: 2.2rem;
      font-weight: 950;
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .arrow {
      margin-top: 16px;
      color: #64748b;
      font-size: 0.92rem;
      font-weight: 850;
    }

    .loading {
      text-align: center;
      font-weight: 850;
      color: #64748b;
      margin-top: 40px;
    }

    @media (max-width: 560px) {
      .wrap { padding-top: 34px; }
      .semester-toggle { width: 100%; }
      .semester-btn { flex: 1; padding: 13px 0; }
      .grid {
        grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
        gap: 14px;
      }
      .card {
        min-height: 132px;
        padding: 20px 16px;
        border-radius: 24px;
      }
      .recommend-medal {
        top: 10px;
        right: 10px;
        width: 58px;
        height: 74px;
      }
      .medal-circle {
        width: 52px;
        height: 52px;
        font-size: 0.68rem;
      }
      .medal-ribbon {
        top: 43px;
        width: 20px;
        height: 27px;
      }
      .medal-ribbon.left { left: 13px; }
      .medal-ribbon.right { right: 13px; }
      .group-name { font-size: 1.75rem; }
      .arrow { font-size: 0.85rem; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header>
      <div class="school-year">2026학년도 과학 교과</div>
      <h1>6학년 과학 게임</h1>
      <p class="desc">학기, 반, 모둠을 선택해서 게임을 시작하세요.</p>
    </header>

    <div class="semester-toggle" aria-label="학기 선택">
      <button class="semester-btn active" type="button" data-semester="1">1학기</button>
      <button class="semester-btn" type="button" data-semester="2">2학기</button>
    </div>

    <section class="semester-heading">
      <h2 id="semesterTitle">1학기 과학 게임</h2>
      <p id="semesterDesc">6학년 1반, 2반, 3반의 모둠을 선택하세요.</p>
    </section>

    <section id="classList"></section>
  </main>

  <script>
    const classList = document.getElementById("classList");
    const semesterTitle = document.getElementById("semesterTitle");
    const semesterDesc = document.getElementById("semesterDesc");
    const semesterButtons = document.querySelectorAll(".semester-btn");

    const classes = [1, 2, 3];
    const groups = [1, 2, 3, 4, 5];
    const recommendedGameKeys = new Set(["1-1-3", "1-1-2", "1-1-1"]);
    const highlightedRecommendationKey = "1-1-3";

    let currentSemester = 1;
    let availableLinks = new Map();

    function getKey(semester, classNumber, groupNumber) {
      return `${semester}-${classNumber}-${groupNumber}`;
    }

    function getLink(semester, classNumber, groupNumber) {
      return `./${semester}학기/6-${classNumber}/${groupNumber}/index.html`;
    }

    async function checkPageExists(url) {
      try {
        const response = await fetch(url, {
          method: "HEAD",
          cache: "no-store"
        });

        if (response.ok) return true;

        const getResponse = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        return getResponse.ok;
      } catch (error) {
        return false;
      }
    }

    async function scanAvailablePages() {
      availableLinks.clear();

      const checks = [];

      classes.forEach((classNumber) => {
        groups.forEach((groupNumber) => {
          const key = getKey(currentSemester, classNumber, groupNumber);
          const link = getLink(currentSemester, classNumber, groupNumber);

          checks.push(
            checkPageExists(link).then((exists) => {
              if (exists) {
                availableLinks.set(key, link);
              }
            })
          );
        });
      });

      await Promise.all(checks);
    }

    function renderCards() {
      semesterTitle.textContent = `${currentSemester}학기 과학 게임`;
      semesterDesc.textContent = `6학년 1반, 2반, 3반의 모둠을 선택하세요.`;

      classList.innerHTML = "";

      classes.forEach((classNumber) => {
        const section = document.createElement("section");
        section.className = "class-section";

        const title = document.createElement("div");
        title.className = "class-title";
        title.textContent = `6학년 ${classNumber}반`;

        const grid = document.createElement("div");
        grid.className = "grid";

        groups.forEach((groupNumber) => {
          const key = getKey(currentSemester, classNumber, groupNumber);
          const link = availableLinks.get(key);
          const isAvailable = Boolean(link);
          const isRecommended = recommendedGameKeys.has(key);
          const isHighlightedRecommendation = key === highlightedRecommendationKey;
          const recommendationBadge = isRecommended
            ? `<span class="recommend-medal${isHighlightedRecommendation ? " representative" : ""}" aria-hidden="true">
                <span class="medal-ribbon left"></span>
                <span class="medal-ribbon right"></span>
                <span class="medal-circle">학년<br>추천</span>
              </span>`
            : "";

          const card = document.createElement(isAvailable ? "a" : "div");
          card.className = isAvailable ? "card" : "card disabled";
          if (isRecommended) {
            card.classList.add("recommended");
          }

          if (isAvailable) {
            card.href = link;
            card.setAttribute(
              "aria-label",
              `${currentSemester}학기 6학년 ${classNumber}반 ${groupNumber}모둠 시작하기${isRecommended ? ", 학년 친구들이 추천한 게임" : ""}`
            );
          } else {
            card.setAttribute("aria-disabled", "true");
            card.setAttribute(
              "aria-label",
              `${currentSemester}학기 6학년 ${classNumber}반 ${groupNumber}모둠은 아직 준비되지 않았습니다${isRecommended ? ", 학년 친구들이 추천한 게임" : ""}`
            );
          }

          card.innerHTML = `
            ${recommendationBadge}
            <span class="class-name">6학년 ${classNumber}반</span>
            <span class="group-name">${groupNumber}모둠</span>
            <span class="arrow">${isAvailable ? "시작하기 →" : "준비 중"}</span>
          `;

          grid.appendChild(card);
        });

        section.appendChild(title);
        section.appendChild(grid);
        classList.appendChild(section);
      });
    }

    async function loadSemester(semester) {
      currentSemester = semester;

      semesterTitle.textContent = `${currentSemester}학기 과학 게임`;
      semesterDesc.textContent = `모둠 파일을 확인하고 있습니다.`;
      classList.innerHTML = `<p class="loading">모둠 확인 중...</p>`;

      await scanAvailablePages();
      renderCards();
    }

    semesterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        semesterButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");

        loadSemester(Number(button.dataset.semester));
      });
    });

    loadSemester(currentSemester);
  </script>
</body>
</html>
